# Render Blueprint - CarotidCheck API
# Deploy: https://dashboard.render.com/blueprints → New Blueprint Instance → Connect repo

databases:
  - name: carotidcheck-db
    plan: free

services:
  - type: web
    name: carotidcheck-api
    runtime: python
    plan: free
    # If repo root is parent of "CarotidCheck app", set rootDir in Render Dashboard → Service → Settings → Root Directory: "CarotidCheck app"

    # Full stack: TensorFlow + OpenCV for Attention U-Net on /scans/upload (needs ML/AttentionUNet.keras + ML/model_layers.py in repo).
    # Free tier may OOM or hit disk limits; upgrade instance if build/runtime fails.
    buildCommand: pip install -r backend/requirements.txt
    # sh -c ensures PORT is expanded; exec replaces shell so signals reach uvicorn.
    startCommand: sh -c 'exec uvicorn backend.main:app --host 0.0.0.0 --port "${PORT}"'

    envVars:
      # TensorFlow has no wheels for Python 3.14+ yet; Render default is 3.14.x without this.
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        fromDatabase:
          name: carotidcheck-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DISABLE_AUTH
        value: "0"
      # Password reset emails link here (must match deployed dashboard origin).
      - key: PASSWORD_RESET_BASE_URL
        value: https://carotidcheck-dashboard.onrender.com
      # Default From: checkcarid@gmail.com — set SMTP_* in Render Dashboard (secrets) to enable sending.
      - key: EMAIL_FROM
        value: checkcarid@gmail.com
      # Reliable email retries via DB queue worker (safe when SMTP not configured; no-op then).
      - key: ALERT_QUEUE_ENABLED
        value: "1"
      - key: ALERT_QUEUE_POLL_SECONDS
        value: "5"

  # Clinician web dashboard (Vite/React SPA → CDN). Build bakes in VITE_API_URL.
  - type: web
    name: carotidcheck-dashboard
    runtime: static
    # Omit plan — static sites do not accept plan: free in Blueprints (sync error services[1].plan).
    buildCommand: cd web-dashboard && npm ci && npm run build
    staticPublishPath: ./web-dashboard/dist
    envVars:
      - key: VITE_API_URL
        value: https://carotidcheck-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
