<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="system-ui, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <style><![CDATA[
      .title { font-size: 15px; font-weight: 600; fill: #1a1a1a; }
      .axis { font-size: 11px; fill: #333; }
      .note { font-size: 9px; fill: #555; font-style: italic; }
      .grid { stroke: #e8e8e8; stroke-width: 1; }
      .bar-vit { fill: #5c6bc0; }
      .bar-unet { fill: #1a5f7a; }
      .target { stroke: #c45c26; stroke-width: 2; stroke-dasharray: 8 5; fill: none; }
    ]]></style>
  </defs>
  <text x="320" y="30" text-anchor="middle" class="title">Figure 5.1 - Validation Dice coefficient (ViT vs. Attention U-Net)</text>
  <line x1="80" y1="100" x2="80" y2="360" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="360" x2="560" y2="360" stroke="#333" stroke-width="1.5"/>
  <!-- Y: 0 at 360, 1.0 at 100, span 260 -->
  <line x1="80" y1="360" x2="560" y2="360" class="grid"/>
  <line x1="80" y1="308" x2="560" y2="308" class="grid"/>
  <line x1="80" y1="256" x2="560" y2="256" class="grid"/>
  <line x1="80" y1="204" x2="560" y2="204" class="grid"/>
  <line x1="80" y1="152" x2="560" y2="152" class="grid"/>
  <line x1="80" y1="100" x2="560" y2="100" class="grid"/>
  <text x="72" y="364" text-anchor="end" class="axis">0</text>
  <text x="72" y="312" text-anchor="end" class="axis">0.2</text>
  <text x="72" y="260" text-anchor="end" class="axis">0.4</text>
  <text x="72" y="208" text-anchor="end" class="axis">0.6</text>
  <text x="72" y="156" text-anchor="end" class="axis">0.8</text>
  <text x="72" y="104" text-anchor="end" class="axis">1.0</text>
  <text x="36" y="240" text-anchor="middle" class="axis" transform="rotate(-90 36 240)">Dice coefficient</text>
  <!-- 0.85 target: y = 360 - 0.85*260 = 139 -->
  <line x1="80" y1="139" x2="560" y2="139" class="target"/>
  <text x="568" y="143" class="axis" fill="#c45c26">0.85 target</text>
  <!-- ViT 0.87: h = 0.87*260 = 226.2, y = 360-226 = 134 -->
  <rect x="150" y="134" width="100" height="226" class="bar-vit" rx="4"/>
  <text x="200" y="126" text-anchor="middle" class="axis" font-weight="600">0.87</text>
  <!-- U-Net 0.94: h = 244.4, y = 116 -->
  <rect x="390" y="116" width="100" height="244" class="bar-unet" rx="4"/>
  <text x="440" y="108" text-anchor="middle" class="axis" font-weight="600">0.94</text>
  <text x="200" y="382" text-anchor="middle" class="axis">ViT</text>
  <text x="440" y="382" text-anchor="middle" class="axis">Attention U-Net</text>
  <text x="320" y="400" text-anchor="middle" class="axis">Model (Momot validation, approximate)</text>
  <text x="320" y="416" text-anchor="middle" class="note">Values from Chapter 5 narrative; replace with exact notebook metrics if they differ. Mean IoU: ViT ~0.78, U-Net ~0.88.</text>
</svg>
