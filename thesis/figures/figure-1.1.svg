<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 300" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .title { font-size: 14px; font-weight: bold; fill: #111; }
      .subtitle { font-size: 11px; fill: #333; }
      .month { font-size: 11px; font-weight: 600; fill: #111; }
      .label { font-size: 10px; fill: #111; }
      .grid { stroke: #bbb; stroke-width: 0.75; }
      .bar { fill: #b8e6b8; stroke: #2d6a2d; stroke-width: 1.25; }
    </style>
  </defs>

  <!-- Frame (minimal border like Google Docs style) -->
  <rect x="0.5" y="0.5" width="779" height="299" fill="#ffffff" stroke="#000000" stroke-width="1"/>

  <!-- Title & subtitle -->
  <text x="390" y="22" text-anchor="middle" class="title">CarotidCheck: 3-Month Research Project Gantt Chart</text>
  <text x="390" y="40" text-anchor="middle" class="subtitle">Timeline (Janvier – Mars 2026)</text>

  <!-- Timeline geometry: chart starts after label column -->
  <!-- Jan: 230–403 | Feb: 403–576 | Mar: 576–749 (third month slightly wider for balance) -->
  <text x="316" y="58" text-anchor="middle" class="month">Janvier</text>
  <text x="489" y="58" text-anchor="middle" class="month">Février</text>
  <text x="662" y="58" text-anchor="middle" class="month">Mars</text>

  <!-- Vertical grid: month boundaries + half-month ticks -->
  <line x1="230" y1="64" x2="230" y2="285" class="grid"/>
  <line x1="316" y1="64" x2="316" y2="285" class="grid"/>
  <line x1="403" y1="64" x2="403" y2="285" class="grid"/>
  <line x1="489" y1="64" x2="489" y2="285" class="grid"/>
  <line x1="576" y1="64" x2="576" y2="285" class="grid"/>
  <line x1="662" y1="64" x2="662" y2="285" class="grid"/>
  <line x1="749" y1="64" x2="749" y2="285" class="grid"/>

  <line x1="230" y1="64" x2="749" y2="64" stroke="#333" stroke-width="1"/>

  <!-- Row separator lines (light) -->
  <line x1="12" y1="88" x2="749" y2="88" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="12" y1="118" x2="749" y2="118" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="12" y1="148" x2="749" y2="148" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="12" y1="178" x2="749" y2="178" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="12" y1="208" x2="749" y2="208" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="12" y1="238" x2="749" y2="238" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="12" y1="268" x2="749" y2="268" stroke="#e0e0e0" stroke-width="0.5"/>

  <!-- Y-axis labels (left) — same tasks as proposal -->
  <text x="14" y="82" class="label">Proposal Refinement &amp; Literature Review</text>
  <text x="14" y="112" class="label">Requirements Gathering</text>
  <text x="14" y="142" class="label">System Design</text>
  <text x="14" y="172" class="label">Prototype Development (Backend/AI)</text>
  <text x="14" y="202" class="label">Pilot Testing (Local Communities)</text>
  <text x="14" y="232" class="label">Data Collection &amp; Analysis</text>
  <text x="14" y="262" class="label">Final Writing &amp; Editing</text>
  <text x="14" y="292" class="label">Submission &amp; Presentation Prep</text>

  <!-- Gantt bars: timing aligned to half-months / weeks within Jan–Mar 2026 -->
  <rect class="bar" x="231" y="68" width="84" height="18" rx="1"/>
  <rect class="bar" x="317" y="98" width="84" height="18" rx="1"/>
  <rect class="bar" x="404" y="128" width="84" height="18" rx="1"/>
  <rect class="bar" x="490" y="158" width="120" height="18" rx="1"/>
  <rect class="bar" x="577" y="188" width="48" height="18" rx="1"/>
  <rect class="bar" x="628" y="218" width="72" height="18" rx="1"/>
  <rect class="bar" x="688" y="248" width="52" height="18" rx="1"/>
  <rect class="bar" x="724" y="278" width="24" height="18" rx="1"/>
</svg>
