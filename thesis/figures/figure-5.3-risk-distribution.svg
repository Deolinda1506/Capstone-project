<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="system-ui, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <style><![CDATA[
      .title { font-size: 15px; font-weight: 600; fill: #1a1a1a; }
      .axis { font-size: 11px; fill: #333; }
      .note { font-size: 9px; fill: #555; font-style: italic; }
      .grid { stroke: #e8e8e8; stroke-width: 1; }
      .bar-low { fill: #2e7d4a; }
      .bar-mod { fill: #c9a227; }
      .bar-high { fill: #b33a3a; }
    ]]></style>
  </defs>
  <text x="320" y="30" text-anchor="middle" class="title">Figure 5.3 - Risk level distribution (CarotidCheck database)</text>
  <line x1="80" y1="100" x2="80" y2="360" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="360" x2="560" y2="360" stroke="#333" stroke-width="1.5"/>
    <line x1="80" y1="360" x2="560" y2="360" class="grid"/>
    <line x1="80" y1="308" x2="560" y2="308" class="grid"/>
    <line x1="80" y1="230" x2="560" y2="230" class="grid"/>
    <line x1="80" y1="152" x2="560" y2="152" class="grid"/>
    <line x1="80" y1="100" x2="560" y2="100" class="grid"/>
    <text x="72" y="364" text-anchor="end" class="axis">0</text>
    <text x="72" y="312" text-anchor="end" class="axis">2</text>
    <text x="72" y="234" text-anchor="end" class="axis">5</text>
    <text x="72" y="156" text-anchor="end" class="axis">8</text>
    <text x="72" y="104" text-anchor="end" class="axis">10</text>
  <text x="40" y="240" text-anchor="middle" class="axis" transform="rotate(-90 40 240)">Number of analyses</text>
  <rect x="110" y="308" width="100" height="52" class="bar-low" rx="4"/>
  <rect x="270" y="334" width="100" height="26" class="bar-mod" rx="4"/>
  <rect x="430" y="204" width="100" height="156" class="bar-high" rx="4"/>
  <text x="160" y="302" text-anchor="middle" class="axis" font-weight="600">2</text>
  <text x="320" y="328" text-anchor="middle" class="axis" font-weight="600">1</text>
  <text x="480" y="198" text-anchor="middle" class="axis" font-weight="600">6</text>
  <text x="160" y="392" text-anchor="middle" class="axis">Low</text>
  <text x="320" y="392" text-anchor="middle" class="axis">Moderate</text>
  <text x="480" y="392" text-anchor="middle" class="axis">High</text>
  <text x="320" y="404" text-anchor="middle" class="axis">Risk category (IMT thresholds)</text>
  <text x="320" y="416" text-anchor="middle" class="note">Counts match production dashboard totals (same as web Overview), total n=9, 2026-03-23. Thresholds: Low &lt;0.9 mm, Moderate 0.9-1.2 mm, High &gt;1.2 mm IMT.</text>
</svg>
